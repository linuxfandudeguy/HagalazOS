<!DOCTYPE html>
<html lang="en">
<head>
<base href="https://cdn.jsdelivr.net/gh/linuxfandudeguy/HagalazOS@c88a28aaade5c9e7d0b0c84d284afd1589155d22/">
<meta charset="UTF-8">
<title>hagalazOS</title>
 <link rel="preconnect" href="https://cdn.jsdelivr.net">
 <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/linuxfandudeguy/hagallcdn@main/tumblr_c6c3374236c7bb8b23abf57754ff37d1_770fc080_250.png">

<style>
body {
    margin: 0;
    height: 100vh;
    background: #0b0c0f;
    color: #d7d7d7;
    font-family: monospace;
    display: flex;
    align-items: center;
    justify-content: center;
}

.screen {
    width: 520px;
}

.box {
    border: 1px solid rgba(255,128,0,0.35);
    padding: 14px;
}

.option {
    padding: 6px 10px;
    margin: 4px 0;
}

.selected {
    background: #ff8000;
    color: #000;
}

.footer {
    margin-top: 10px;
    color: #777;
    font-size: 12px;
}

body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events: none;
    opacity: 0.25;
}
</style>
</head>

<body>

<div class="screen">
    <div class="box">
        <div id="gui" class="option selected">
             HagalazOS (GUI)
        </div>

        <div id="term" class="option">
            HagalazOS (Terminal)
        </div>
    </div>

    <div class="footer">
        ↑ ↓ select • ENTER boot (chainload)
    </div>
</div>

<script>
let index = 0;

const options = [
    { el: document.getElementById("gui"), url: "./ossingle.html" },
    { el: document.getElementById("term"), url: "./terminal.html" }
];

function render() {
    options.forEach((o, i) => {
        o.el.classList.toggle("selected", i === index);
    });
}

async function boot() {
    const target = options[index].url;

    try {
        const res = await fetch(target);
        const html = await res.text();

        // wipe current document and replace entirely
        document.open();
        document.write(html);
        document.close();

    } catch (err) {
        document.body.innerHTML = `
            <pre style="color:#ff8000;">
LOAD FAILURE
------------------
Target: ${target}
Error: ${err}
            </pre>
        `;
    }
}

document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowDown") index = (index + 1) % options.length;
    if (e.key === "ArrowUp") index = (index - 1 + options.length) % options.length;
    if (e.key === "Enter") boot();
    render();
});

render();
</script>

</body>
</html>
