      function openDB() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open("shittify-uploads", 1);
          req.onupgradeneeded = (e) => {
            const d = e.target.result;
            if (!d.objectStoreNames.contains("songs")) {
              d.createObjectStore("songs", { keyPath: "id" });
            }
          };
          req.onsuccess = (e) => resolve(e.target.result);
          req.onerror = (e) => reject(e.target.error);
        });
      }

      function dbGetAll() {
        return new Promise((resolve, reject) => {
          const tx = db.transaction("songs", "readonly");
          const store = tx.objectStore("songs");
          const req = store.getAll();
          req.onsuccess = () => resolve(req.result);
          req.onerror = (e) => reject(e.target.error);
        });
      }

      function dbPut(song) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction("songs", "readwrite");
          const store = tx.objectStore("songs");
          const req = store.put(song);
          req.onsuccess = () => resolve();
          req.onerror = (e) => reject(e.target.error);
        });
      }

      function setupArrowButtons() {
        document.querySelectorAll(".arrow-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            const targetId = btn.dataset.target;
            const cards = document.getElementById(targetId);
            if (!cards) return;
            const scrollAmount = 191.5 * 3;
            if (btn.classList.contains("arrow-left")) {
              cards.scrollLeft -= scrollAmount;
            } else {
              cards.scrollLeft += scrollAmount;
            }
            setTimeout(() => updateArrowStates(cards), 320);
          });
        });

        document.querySelectorAll(".cards").forEach((cards) => {
          cards.addEventListener("scroll", () => updateArrowStates(cards));
          updateArrowStates(cards);
        });
      }

      function updateArrowStates(cards) {
        const wrapper = cards.closest(".cards-wrapper");
        if (!wrapper) return;
        const leftBtn = wrapper.querySelector(".arrow-left");
        const rightBtn = wrapper.querySelector(".arrow-right");
        const atStart = cards.scrollLeft <= 2;
        const atEnd =
          cards.scrollLeft + cards.clientWidth >= cards.scrollWidth - 2;
        if (leftBtn) leftBtn.disabled = atStart;
        if (rightBtn) rightBtn.disabled = atEnd;
      }

      function shuffle(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function mergeArrayBuffers(buffers) {
        let totalLength = buffers.reduce((sum, b) => sum + b.byteLength, 0);
        let temp = new Uint8Array(totalLength);
        let offset = 0;
        for (let buffer of buffers) {
          temp.set(new Uint8Array(buffer), offset);
          offset += buffer.byteLength;
        }
        return temp.buffer;
      }

      function showModal(html, onMount) {
        const overlay = document.createElement("div");
        overlay.classList.add("modal-overlay");
        overlay.innerHTML = `<div class="modal-box">${html}</div>`;
        document.body.appendChild(overlay);
        overlay.addEventListener("click", (e) => {
          if (e.target === overlay) overlay.remove();

      function renderPlaylists() {

      function resolveAlbumCover(songOrAlbum) {
        if (songOrAlbum.cover) return songOrAlbum.cover;
        const albumName = songOrAlbum.album || songOrAlbum.name;
        if (albumName && albumName !== "single") {
          const found = metaJson.albums.find((a) => a.name === albumName);
          if (found && found.cover) return found.cover;
        }
        return "";
      }

      function populateHomeSections() {
        const WEEK_MS = 7 * 24 * 60 * 60 * 1000;

        // FIX 1: build the full unsliced new-additions list first, then slice 12 for the home row
        allNewSongsFull = Array.from(
          new Map(
            metaJson.songs
              .filter((song) => {
                const diff = Date.now() - new Date(song.dateAdded).getTime();
                return diff >= 0 && diff <= WEEK_MS;
              })
              .sort((a, b) => new Date(b.dateAdded) - new Date(a.dateAdded))
              .map((song) => {
                const displayName =
                  song.album === "single" ? song.title : song.album;
                const cover = resolveAlbumCover(song);
                return [
                  displayName,
                  {
                    id: song.id,
                    name: displayName,
                    cover,
                    artist: song.artist,
                    album: song.album,
                    parts: song.parts,
                    title: song.title,
                  },
                ];
              }),
          ).values(),
        );
        allNewSongs = allNewSongsFull.slice(0, 12);

        allArtists = shuffle(metaJson.profiles);

        // FIX 2: build the full shuffled albums list, then slice 12 for the home row
        allAlbumsFull = shuffle(
          Array.from(
            new Map([
              ...metaJson.songs.map((song) => {
                const displayName =
                  song.album === "single" ? song.title : song.album;
                const cover = resolveAlbumCover(song);
                return [
                  displayName,
                  {
                    id: song.id,
                    title: song.title,
                    name: displayName,
                    album: song.album,
                    artist: song.artist,
                    cover,
                    parts: song.parts,
                    dateAdded: song.dateAdded,
                    isAlbum: false,
                  },
                ];
              }),
              ...metaJson.albums.map((album) => [
                album.name,
                {
                  id: album.id,
                  title: album.name,
                  name: album.name,
                  album: album.name,
                  artist: album.artist || null,
                  cover: album.cover,
                  parts: album.parts || [],
                  dateAdded: album.dateAdded || null,
                  isAlbum: true,
                },
              ]),
            ]).values(),
          ),
        );
        allAlbums = allAlbumsFull.slice(0, 12);

        const newContainer = document.getElementById("cards-new");
        const artistsContainer = document.getElementById("cards-artists");
        const albumsContainer = document.getElementById("cards-albums");

        allNewSongs.forEach((song) => {
          newContainer.appendChild(makeCard(song, () => openSong(song)));
        });

        allArtists.forEach((profile) => {
          artistsContainer.appendChild(
            makeArtistCard(profile, () => openArtistPage(profile)),
          );
        });

        allAlbums.forEach((song) => {
          albumsContainer.appendChild(makeCard(song, () => openSong(song)));
        });

        setTimeout(() => {
          document
            .querySelectorAll(".cards")
            .forEach((c) => updateArrowStates(c));
        }, 100);
      }

                showAddToPlaylistModal(s);
                return;
              }
              allSongsRN = matchedSongs;
              await fetchMP3(s);
            });
            songsList.appendChild(row);
          });
          songsStuff.appendChild(songsList);
        }

        if (matchedUploaded.length > 0) {
          const h = document.createElement("h2");
          h.textContent = "Your Uploads";
          h.style.cssText = "font-size:1.2rem;margin-bottom:10px;";
          songsStuff.appendChild(h);
          const grid = document.createElement("div");
          grid.classList.add("search-results-grid");
          matchedUploaded.forEach((song) =>
            grid.appendChild(makeUploadedCard(song)),
          );
          songsStuff.appendChild(grid);
        }

        if (
          !matchedSongs.length &&
          !matchedArtists.length &&
          !matchedAlbums.length &&
          !matchedUploaded.length
        ) {
          const empty = document.createElement("p");
          empty.style.cssText = "opacity:0.5;margin-top:20px;";
          empty.textContent = `No results found for "${query}"`;
          songsStuff.appendChild(empty);
        }
      }

      let searchTimeout;
      document.getElementById("search-input").addEventListener("input", (e) => {
        clearTimeout(searchTimeout);
        const q = e.target.value.trim();
        if (!q) {
          showHome();
          return;
        }
        searchTimeout = setTimeout(() => openSearchResults(q), 300);
      });

      document.getElementById("home-btn").addEventListener("click", () => {
        document.getElementById("search-input").value = "";
        showHome();
      });

      async function openSong(song) {
        let newSongOrAlbum;
        if (song.album === "single") {
          newSongOrAlbum = song;
          await fetchMP3(song);
        } else {
          newSongOrAlbum = metaJson.albums.find(
            (a) => a.name === song.album || a.name === song.name,
          );
          if (!newSongOrAlbum) {
            newSongOrAlbum = song;
          }
        }
        openBigSongUI(newSongOrAlbum);
      }

      function applyTitleSizing(el, text) {
        el.classList.remove("long-title", "very-long-title");
        if (text.length > 30) {
          el.classList.add("very-long-title");
        } else if (text.length > 18) {
          el.classList.add("long-title");
        }
      }

      async function openBigSongUI(song) {
        let songsInAlbum;
        let currentID = 1;
        const songsStuff = document.getElementById("songs-stuff");
        songsStuff.className = "songs-stuff red-stuff";
        songsStuff.scrollTop = 0;

        const artistName = song.artist || "";
        const artistProfile = metaJson.profiles.find(
          (p) => p.name === artistName,
        );

        const resolvedCover = resolveAlbumCover(song);
        const displayName = song.name || song.title;

        songsStuff.innerHTML = `
          <div class="top-player-info">
            ${
              resolvedCover
                ? `<img src="${resolvedCover}" class="big-cover" />`
                : `<div class="big-cover" style="background:#2c2c2c;display:flex;align-items:center;justify-content:center;">
                  <svg viewBox="0 0 24 24" style="fill:#555;width:64px;height:64px;"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                </div>`
            }
            <div class="top-actual-info" style="min-width:0;overflow:hidden;">
              <h1 class="huge-title" id="big-song-title">${displayName}</h1>
              <p class="${artistProfile ? "artist-clicky-link" : "artist-clicky"}" id="song-artist-link">${artistName}</p>
            </div>
          </div>
          <div class="play-options">
            <button class="big-play">
              <svg data-encore-id="icon" role="img" aria-hidden="true" class="play-icon-but-cool" viewBox="0 0 16 16">
                <path d="M3 1.713a.7.7 0 0 1 1.05-.607l10.89 6.288a.7.7 0 0 1 0 1.212L4.05 14.894A.7.7 0 0 1 3 14.288z"></path>
              </svg>
            </button>
            <button class="add-to-album-big">
              <svg data-encore-id="icon" role="img" aria-hidden="true" class="add-icon" viewBox="0 0 24 24">
                <path d="M11.999 3a9 9 0 1 0 0 18 9 9 0 0 0 0-18m-11 9c0-6.075 4.925-11 11-11s11 4.925 11 11-4.925 11-11 11-11-4.925-11-11"></path>
                <path d="M17.999 12a1 1 0 0 1-1 1h-4v4a1 1 0 1 1-2 0v-4h-4a1 1 0 1 1 0-2h4V7a1 1 0 1 1 2 0v4h4a1 1 0 0 1 1 1"></path>
              </svg>
            </button>
          </div>
          <div class="songs-in-album">
            <div class="album-header"><p class="hash">#</p><p class="title-sayer">Title</p></div>
            <div class="songs-place2"></div>
          </div>
        `;

        const bigSongTitle = document.getElementById("big-song-title");
        if (bigSongTitle) applyTitleSizing(bigSongTitle, displayName);

        const artistLink = document.getElementById("song-artist-link");
        if (artistProfile && artistLink) {
          artistLink.addEventListener("click", () =>
            openArtistPage(artistProfile),
          );
        }

        if (song.album !== "single" && song.name) {
          songsInAlbum = metaJson.songs.filter((s) => s.album === song.name);
          allSongsRN = songsInAlbum;
        } else {
          songsInAlbum = [song];
          allSongsRN = songsInAlbum;
        }

        const putSongsIn = songsStuff.querySelector(".songs-place2");
        const bigPlayBtn = songsStuff.querySelector(".big-play");
        const addAlbumBtn = songsStuff.querySelector(".add-to-album-big");

        bigPlayBtn.addEventListener("click", async () => {
          await fetchMP3(songsInAlbum[0]);
        });
        addAlbumBtn.addEventListener("click", () => {
          showAddToPlaylistModal(
            song.album === "single" ? song : songsInAlbum[0],
          );
        });

        songsInAlbum.forEach((ssong) => {
          const singleSong = document.createElement("div");
          singleSong.classList.add("song56");
          singleSong.innerHTML = `
            <div class="song56-left">
              <p class="song-number">${currentID}</p>
              <p class="song-title-small">${ssong.title}</p>
            </div>
            <div class="songs56-right">
              <button class="add-to-album" title="Add to playlist">
                <svg data-encore-id="icon" role="img" aria-hidden="true" class="add-icon" viewBox="0 0 24 24">
                  <path d="M11.999 3a9 9 0 1 0 0 18 9 9 0 0 0 0-18m-11 9c0-6.075 4.925-11 11-11s11 4.925 11 11-4.925 11-11 11-11-4.925-11-11"></path>
                  <path d="M17.999 12a1 1 0 0 1-1 1h-4v4a1 1 0 1 1-2 0v-4h-4a1 1 0 1 1 0-2h4V7a1 1 0 1 1 2 0v4h4a1 1 0 0 1 1 1"></path>
                </svg>
              </button>
            </div>
          `;
          putSongsIn.appendChild(singleSong);
          singleSong.addEventListener("click", async (e) => {
            if (e.target.closest(".add-to-album")) {
              showAddToPlaylistModal(ssong);
              return;
            }
            await fetchMP3(ssong);
          });
          currentID++;
        });
      }

      async function fetchMP3(song) {
        if (song.uploadedBlob) {
          const audio = new Audio(song.uploadedBlob);
          songUI(audio, song);
          return;
        }
        if (song.uploadedData) {
          const blob = new Blob([song.uploadedData], { type: "audio/mpeg" });
          const url = URL.createObjectURL(blob);
          const audio = new Audio(url);
          songUI(audio, song);
          return;
        }
        if (song.parts === 1) {
          const res = await fetch(`audio/${song.id}/audio_part1.mp3`);
          if (!res.ok) {
            alert("couldn't load song");
            return;
          }
          const buffer = await res.arrayBuffer();
          const blob = new Blob([buffer], { type: "audio/mpeg" });
          const audio = new Audio(URL.createObjectURL(blob));
          songUI(audio, song);
          return;
        }
        const files = [];
        for (let i = 1; i <= song.parts; i++) {
          const res = await fetch(`audio/${song.id}/audio_part${i}.mp3`);
          if (!res.ok) {
            console.error("couldn't load part:", i);
            return;
          }
          files.push(await res.arrayBuffer());
        }
        const blob = new Blob([mergeArrayBuffers(files)], {
          type: "audio/mpeg",
        });
        const audio = new Audio(URL.createObjectURL(blob));
        songUI(audio, song);
      }

      async function songUI(audio, song) {
        if (currentAudio && currentAudio !== audio) currentAudio.pause();
        currentAudio = audio;

        let songPlayer = document.querySelector(".song-player");
        if (!songPlayer) {
          songPlayer = document.createElement("div");
          songPlayer.classList.add("song-player");
          document.body.appendChild(songPlayer);
        }

        const pauseSVG = `<svg data-encore-id="icon" role="img" aria-hidden="true" viewBox="0 0 16 16"><path d="M2.7 1a.7.7 0 0 0-.7.7v12.6a.7.7 0 0 0 .7.7h2.6a.7.7 0 0 0 .7-.7V1.7a.7.7 0 0 0-.7-.7zm8 0a.7.7 0 0 0-.7.7v12.6a.7.7 0 0 0 .7.7h2.6a.7.7 0 0 0 .7-.7V1.7a.7.7 0 0 0-.7-.7z"></path></svg>`;
        const playSVG = `<svg data-encore-id="icon" role="img" aria-hidden="true" viewBox="0 0 16 16"><path d="M3 1.713a.7.7 0 0 1 1.05-.607l10.89 6.288a.7.7 0 0 1 0 1.212L4.05 14.894A.7.7 0 0 1 3 14.288z"></path></svg>`;

        const playerCover = resolveAlbumCover(song);
        const coverHTML = playerCover
          ? `<img src="${playerCover}" class="player-img" />`
          : `<div style="width:60px;height:60px;border-radius:5px;background:#2c2c2c;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg viewBox="0 0 24 24" style="fill:#888;width:24px;height:24px;"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>`;

        const artistProfile = metaJson.profiles.find(
          (p) => p.name === song.artist,
        );

        songPlayer.innerHTML = `
          <div class="far-left">
            ${coverHTML}
            <div class="player-info">
              <p class="player-song-name">${song.title}</p>
              <p class="player-artist-name" id="player-artist-btn" style="${artistProfile ? "cursor:pointer;" : ""}">${song.artist || "You"}</p>
            </div>
          </div>
          <div class="centrist">
            <div class="controls">
              <button class="nothing">
                <svg data-encore-id="icon" role="img" aria-hidden="true" class="bs-icon" viewBox="0 0 16 16">
                  <path d="M13.151.922a.75.75 0 1 0-1.06 1.06L13.109 3H11.16a3.75 3.75 0 0 0-2.873 1.34l-6.173 7.356A2.25 2.25 0 0 1 .39 12.5H0V14h.391a3.75 3.75 0 0 0 2.873-1.34l6.173-7.356a2.25 2.25 0 0 1 1.724-.804h1.947l-1.017 1.018a.75.75 0 0 0 1.06 1.06L15.98 3.75z"></path>
                  <path d="m7.5 10.723.98-1.167.957 1.14a2.25 2.25 0 0 0 1.724.804h1.947l-1.017-1.018a.75.75 0 1 1 1.06-1.06l2.829 2.828-2.829 2.828a.75.75 0 1 1-1.06-1.06L13.109 13H11.16a3.75 3.75 0 0 1-2.873-1.34l-.787-.938z"></path>
                </svg>
              </button>
              <button class="player-back">
                <svg data-encore-id="icon" role="img" aria-hidden="true" class="back-icon" viewBox="0 0 16 16">
                  <path d="M3.3 1a.7.7 0 0 1 .7.7v5.15l9.95-5.744a.7.7 0 0 1 1.05.606v12.575a.7.7 0 0 1-1.05.607L4 9.149V14.3a.7.7 0 0 1-.7.7H1.7a.7.7 0 0 1-.7-.7V1.7a.7.7 0 0 1 .7-.7z"></path>
                </svg>
              </button>
              <button class="player-play"></button>
              <button class="player-next">
                <svg data-encore-id="icon" role="img" aria-hidden="true" class="next-icon" viewBox="0 0 16 16">
                  <path d="M3 1.713a.7.7 0 0 1 1.05-.607l10.89 6.288a.7.7 0 0 1 0 1.212L4.05 14.894A.7.7 0 0 1 3 14.288z"></path>
                </svg>
              </button>
              <button class="loop">
                <svg data-encore-id="icon" role="img" aria-hidden="true" class="loop-icon" viewBox="0 0 16 16">
                  <path d="M0 4.75A3.75 3.75 0 0 1 3.75 1h8.5A3.75 3.75 0 0 1 16 4.75v5a3.75 3.75 0 0 1-3.75 3.75H9.81l1.018 1.018a.75.75 0 1 1-1.06 1.06L6.939 12.75l2.829-2.828a.75.75 0 1 1 1.06 1.06L9.811 12h2.439a2.25 2.25 0 0 0 2.25-2.25v-5a2.25 2.25 0 0 0-2.25-2.25h-8.5A2.25 2.25 0 0 0 1.5 4.75v5A2.25 2.25 0 0 0 3.75 12H5v1.5H3.75A3.75 3.75 0 0 1 0 9.75z"></path>
                </svg>
              </button>
            </div>
            <div class="song-progress">
              <p class="progression current-time">0:00</p>
              <progress class="progress-bar" value="0" max="100"></progress>
              <p class="progression total-time">0:00</p>
            </div>
          </div>
          <div class="far-right">
            <button class="close-player">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" stroke="rgb(136,136,136)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        `;

        const playerArtistBtn = document.getElementById("player-artist-btn");
        if (artistProfile && playerArtistBtn) {
          playerArtistBtn.addEventListener("click", () =>
            openArtistPage(artistProfile),
          );
        }

        function formatTime(secs) {
          if (isNaN(secs)) return "0:00";
          const m = Math.floor(secs / 60);
          const s = Math.floor(secs % 60)
            .toString()
            .padStart(2, "0");
          return `${m}:${s}`;
        }

        const playBtn = songPlayer.querySelector(".player-play");
        const progressBar = songPlayer.querySelector(".progress-bar");
        const currentTimeEl = songPlayer.querySelector(".current-time");
        const totalTimeEl = songPlayer.querySelector(".total-time");
        const backBtn = songPlayer.querySelector(".player-back");
        const nextBtn = songPlayer.querySelector(".player-next");
        const loopBtn = songPlayer.querySelector(".loop");
        const closeBtn = songPlayer.querySelector(".close-player");

        function syncPlayIcon() {
          playBtn.innerHTML = audio.paused ? playSVG : pauseSVG;
          playBtn.style.cssText =
            "display:flex;align-items:center;justify-content:center;background-color:#ffffff;padding:7px;width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;";
          playBtn.querySelector("svg").style.cssText =
            "fill:black;height:16px;width:16px;";
        }

        syncPlayIcon();
        audio.play().then(syncPlayIcon);

        if (audio.readyState >= 1) {
          totalTimeEl.textContent = formatTime(audio.duration);
        } else {
          audio.addEventListener(
            "loadedmetadata",
            () => {
              totalTimeEl.textContent = formatTime(audio.duration);
            },
            { once: true },
          );
        }

        function onTimeUpdate() {
          if (!audio.duration) return;
          progressBar.value = (audio.currentTime / audio.duration) * 100;
          currentTimeEl.textContent = formatTime(audio.currentTime);
        }
        audio.addEventListener("timeupdate", onTimeUpdate);

        let isDragging = false;

        progressBar.addEventListener("mousedown", (e) => {
          isDragging = true;
          const rect = progressBar.getBoundingClientRect();
          audio.currentTime =
            ((e.clientX - rect.left) / rect.width) * audio.duration;
        });

        document.addEventListener("mousemove", (e) => {
          if (!isDragging) return;
          const rect = progressBar.getBoundingClientRect();
          const ratio = Math.max(
            0,
            Math.min(1, (e.clientX - rect.left) / rect.width),
          );
          audio.currentTime = ratio * audio.duration;
          progressBar.value = ratio * 100;
          currentTimeEl.textContent = formatTime(audio.currentTime);
        });

        document.addEventListener("mouseup", () => {
          isDragging = false;
        });

        progressBar.addEventListener(
          "touchstart",
          (e) => {
            isDragging = true;
            const touch = e.touches[0];
            const rect = progressBar.getBoundingClientRect();
            audio.currentTime =
              Math.max(
                0,
                Math.min(1, (touch.clientX - rect.left) / rect.width),
              ) * audio.duration;
          },
          { passive: true },
        );

        document.addEventListener(
          "touchmove",
          (e) => {
            if (!isDragging) return;
            const touch = e.touches[0];
            const rect = progressBar.getBoundingClientRect();
            const ratio = Math.max(
              0,
              Math.min(1, (touch.clientX - rect.left) / rect.width),
            );
            audio.currentTime = ratio * audio.duration;
            progressBar.value = ratio * 100;
            currentTimeEl.textContent = formatTime(audio.currentTime);
          },
          { passive: true },
        );

        document.addEventListener("touchend", () => {
          isDragging = false;
        });

        playBtn.addEventListener("click", () => {
          if (audio.paused) {
            audio.play();
          } else {
            audio.pause();
          }
          syncPlayIcon();
        });

        const currentIndex = allSongsRN.findIndex((s) => s.id === song.id);

        backBtn.addEventListener("click", async () => {
          if (audio.currentTime > 3) {
            audio.currentTime = 0;
            return;
          }
          const prevIndex = currentIndex - 1;
          if (prevIndex >= 0) {
            audio.removeEventListener("timeupdate", onTimeUpdate);
            await playAnySong(allSongsRN[prevIndex]);
          }
        });

        nextBtn.addEventListener("click", async () => {
          const nextIndex = currentIndex + 1;
          if (nextIndex < allSongsRN.length) {
            audio.removeEventListener("timeupdate", onTimeUpdate);
            await playAnySong(allSongsRN[nextIndex]);
          }
        });

        audio.addEventListener("ended", () => {
          if (!audio.loop) {
            const nextIndex = currentIndex + 1;
            if (nextIndex < allSongsRN.length) {
              audio.removeEventListener("timeupdate", onTimeUpdate);
              playAnySong(allSongsRN[nextIndex]);
            } else {
              syncPlayIcon();
              progressBar.value = 0;
              currentTimeEl.textContent = "0:00";
            }
          }
        });

        loopBtn.addEventListener("click", () => {
          audio.loop = !audio.loop;
          loopBtn.style.opacity = audio.loop ? "1" : "0.4";
        });

        closeBtn.addEventListener("click", () => {
          audio.pause();
          audio.loop = false;
          audio.removeEventListener("timeupdate", onTimeUpdate);
          songPlayer.remove();
          currentAudio = null;
        });
      }

      async function main() {
        db = await openDB();
        const meta = await fetchMetaStuff();
        if (meta) metaJson = meta;
        await loadUploaded();
        populateHomeSections();
        attachShowAllListeners();
        renderPlaylists();
        setupArrowButtons();
      }

      main();
    </script>
  </body>
  <div id="splash">
    <img src="logo.png" />
    <span>Evil Spotify</span>
  </div>
