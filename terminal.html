<!DOCTYPE html>

<head>
<script>
function escapeHTML(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

</script>
<meta charset="UTF-8">
<title>terminal</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Consolas,monospace;
    background:#000;
}

#bg{
    position:fixed;
    inset:0;
    z-index:0;
}

#terminal{
    position:relative;
    z-index:1;
    height:100%;
    width:100%;
    padding:18px;
    box-sizing:border-box;
    color:#fff;
    overflow-y:auto;
    background:rgba(0,0,0,0.55);
}

#output{ white-space:pre-wrap; }

#logo{
    white-space:pre;
    font-size:11px;
    line-height:1;
    margin-bottom:10px;
}

#line{ display:flex; align-items:center; }

#prompt{ color:#FF8000; }

#input{
    flex:1;
    border:none;
    outline:none;
    background:transparent;
    color:#fff;
    font:inherit;
    padding-left:8px;
}
</style>
</head>

<body>

<div id="bg"></div>

<div id="terminal">

<div id="output">

<div id="logo">
       <span style="color:#ff8700">▄</span><span style="color:#ffaf87">▄</span><span style="color:#ffd75f;background:#d75f00">▄</span><span style="color:#ffd787;background:#d75f00">▄</span><span style="color:#ffd75f">▄</span><span style="color:#ff8700">▄</span>
      <span style="background:#ff8700">▄▄</span><span style="background:#ffaf87">▄▄▄▄</span><span style="background:#ff8700">▄▄</span>
     <span style="color:#d75f00">▀</span><span style="background:#ff8700">▄▄</span><span style="background:#ff5f00">▄▄▄▄▄▄</span><span style="color:#d75f00">▀</span>
      <span style="color:#ffaf87">▀</span><span style="background:#ffaf87">▄</span><span style="background:#ffaf87">▄</span><span style="background:#ffd75f">▄</span><span style="background:#ffaf87">▄</span><span style="background:#ffaf87">▄</span><span style="background:#ff8700">▄</span><span style="color:#ffaf87">▀</span>
     <span style="color:#ff8700">▄</span><span style="color:#ffaf87">▄</span><span style="background:#d75f00">▄</span><span style="background:#ffaf87">▄</span><span style="background:#ffffaf">▄▄</span><span style="background:#ffaf87">▄</span><span style="background:#ff5f00">▄</span><span style="color:#ffaf87">▄</span><span style="color:#d75f00">▄</span>
   <span style="color:#ff8700">▄</span><span style="background:#d75f5f">▄</span><span style="background:#ffd75f">▄</span><span style="background:#ff5f00">▄</span><span style="background:#ff5f5f">▄</span><span style="background:#ffaf87">▄</span><span style="background:#ffd75f">▄▄</span><span style="background:#ffaf87">▄</span><span style="background:#ff5f5f">▄</span><span style="background:#ff5f00">▄</span><span style="background:#ffd75f">▄</span><span style="background:#d75f5f">▄</span><span style="color:#d75f00">▄</span>

   <span style="color:#ffaf00">▀</span><span style="background:#ffaf87">▄▄</span><span style="background:#ffd75f">▄</span><span style="background:#ffd75f">▄</span><span style="background:#ffff5f">▄</span><span style="background:#ffffaf">▄▄</span><span style="background:#ffff5f">▄</span><span style="background:#ffd75f">▄</span><span style="background:#ffd75f">▄</span><span style="background:#ffaf87">▄</span><span style="background:#ffaf87">▄</span><span style="color:#ffaf00">▀</span>

<!-- LUMIN CONTAINER (terminal-side optional use) -->
<div id="games" style="display:none;"></div>

<!-- THREE -->
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>

<!-- VANTA -->
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.globe.min.js"></script>

<!-- LIBCURL -->
<script src="https://cdn.jsdelivr.net/npm/libcurl.js@0.7.1/libcurl_full.js"></script>

<!-- LUMIN -->
<script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>

<script>

/////////////////////////////////////////////////////
// VANTA
/////////////////////////////////////////////////////
VANTA.GLOBE({
    el:"#bg",
    mouseControls:true,
    touchControls:true,
    gyroControls:false,
    minHeight:200,
    minWidth:200,
    scale:1,
    scaleMobile:1,
    color:0xff8000
});

/////////////////////////////////////////////////////
// LIBCURL
/////////////////////////////////////////////////////
document.addEventListener("libcurl_load", () => {
    libcurl.set_websocket("wss://wisp.mercurywork.shop/");
});

/////////////////////////////////////////////////////
// TERMINAL CORE
/////////////////////////////////////////////////////

const input=document.getElementById("input");
const output=document.getElementById("output");

function print(text, color = "#ccc") {
  output.innerHTML += `<div style="color:${color}">${escapeHTML(text)}</div>`;
}

function help(){
print(`
Available commands:

help        show help
time        show time
echo <txt>  print text
curl <url>  fetch URL
ip          show public IP
games       open game loader (about:blank)
neofetch    system info
gui         open GUI mode
luminsdk    open Lumin SDK (about:blank)
`);
}

async function runCurl(url){
    try{
        const res=await libcurl.fetch(url);
        const text=await res.text();
        print(text.slice(0,3000));
    }catch(e){
        print("curl error: "+e.message,"red");
    }
}

async function getIP(){
    try{
        const r = await fetch("https://api.ipify.org?format=json");
        const d = await r.json();
        print("IP: " + d.ip, "#6cff6c");
    } catch(e){
        print("IP fetch failed","red");
    }
}

function neofetch(){
    print("──────── neofetch ────────","#ff8000");
    print("OS: HagalazOS");
    print("Browser: " + navigator.userAgent);
    print("Platform: " + navigator.platform);
    print("Lang: " + navigator.language);
    print("Cookies: " + navigator.cookieEnabled);
    print("--------------------------","#ff8000");
}

function openGames(){
    const w = window.open("about:blank");

    const html = `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>games</title></head>
<body>
<script>


  const targetUrl="https://raw.githubusercontent.com/linuxfandudeguy/melonsoda/refs/heads/main/offline/index.html";

  let html = await fetch(targetUrl).then(r=>r.text());

  document.open();
  document.write(html);
  document.close();
})();
<\/script>
</body></html>`;

    w.document.open();
    w.document.write(html);
    w.document.close();
}

function gui(){
    const w = window.open("about:blank");
    w.document.write("<h2>going to gui mode...</h2>");
}

async function fgui(){
    const html = await fetch("https://raw.githubusercontent.com/linuxfandudeguy/HagalazOS/refs/heads/master/ossingle.html")
        .then(r => r.text());

    document.open();
    document.write(html);
    document.close();
}

function luminsdk(){
    const w = window.open("about:blank");

    const html = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lumin SDK</title>
</head>
<body style="margin:0;background:#000;overflow:hidden;">

<div id="games"></div>

<script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"><\/script>
<script>
  Lumin.init({
    container: '#games',
    theme: 'dark'
  });
<\/script>

</body>
</html>`;

    w.document.open();
    w.document.write(html);
    w.document.close();
}

/////////////////////////////////////////////////////
// INPUT HANDLER
/////////////////////////////////////////////////////

input.addEventListener("keydown",e=>{
    if(e.key!=="Enter") return;

    const cmd=input.value.trim();
    print(`user@hagalaz:~$ ${cmd}`,"#FF8000");

    if(cmd==="help") help();
    else if(cmd==="time") print(new Date().toString());
    else if(cmd.startsWith("echo ")) print(cmd.slice(5));
    else if(cmd.startsWith("curl ")) runCurl(cmd.slice(5));
    else if(cmd==="ip") getIP();
    else if(cmd==="games") openGames();
    else if(cmd==="neofetch") neofetch();
    else if(cmd==="gui") fgui();
    else if(cmd==="luminsdk") luminsdk();
    else if(cmd) print("command not found: "+cmd,"#ff5555");

    input.value="";
    document.getElementById("terminal").scrollTop=999999;
});

input.focus();

</script>

</body>
</html>
